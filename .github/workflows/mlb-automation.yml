name: MLB Automation

on:
  schedule:
    - cron: '0 11 * * *'
    - cron: '0 18-23 * * *'
    - cron: '0 0-5 * * *'
  workflow_dispatch:

jobs:
  fetch-odds:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 11 * * *'
    steps:
      - name: Fetch odds
        run: curl -s https://mlb-picks-gray.vercel.app/api/fetch-odds

  update-scores:
    runs-on: ubuntu-latest
    if: github.event.schedule != '0 11 * * *'
    steps:
      - name: Update scores
        run: curl -s https://mlb-picks-gray.vercel.app/api/update-scores